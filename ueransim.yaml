apiVersion: apps/v1
kind: Deployment
metadata:
  name: ueransim
  namespace: 5g-lab
spec:
  replicas: 14  # Scaling to 14 RAN nodes (gNB + UE pairs)
  selector:
    matchLabels:
      app: ueransim
  template:
    metadata:
      labels:
        app: ueransim
    spec:
      containers:
      - name: gnb
        image: herlesupreeth/ueransim:latest
        imagePullPolicy: IfNotPresent
        command: ["./nr-gnb"]
        args: ["-c", "/etc/ueransim/gnb.yaml"]
        securityContext:
          privileged: true
        volumeMounts:
        - name: config-volume
          mountPath: /etc/ueransim
      - name: ue
        image: herlesupreeth/ueransim:latest
        imagePullPolicy: IfNotPresent
        command: ["sleep", "infinity"]
      volumes:
      - name: config-volume
        configMap:
          name: ueransim-config
