apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongodb-standalone
  namespace: 5g-lab
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mongodb
  template:
    metadata:
      labels:
        app: mongodb
    spec:
      containers:
      - name: mongodb
        image: mongo:6.0
        ports:
        - containerPort: 27017
        volumeMounts:
        - mountPath: /data/db
          name: datadir
      volumes:
      - name: datadir
        emptyDir: {}
